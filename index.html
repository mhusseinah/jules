<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souq Cars</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6', // Blue-500
                        accent: '#EF4444', // Red-500
                        light: '#FFFFFF',
                        dark: '#111827',
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        ::-webkit-scrollbar-thumb {
            background: #888;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
        .dark ::-webkit-scrollbar-track {
            background: #2d3748;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #718096;
        }
        .dark ::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }
    </style>
</head>
<body class="bg-light dark:bg-dark">
    <div id="root">
        <div class="flex items-center justify-center h-screen">
            <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-200">Loading...</h1>
        </div>
    </div>
    <script type="text/babel">
        // --- THEME SWITCHER ---
        const ThemeSwitcher = () => {
            const [isDarkMode, setIsDarkMode] = React.useState(localStorage.getItem('theme') === 'dark');

            React.useEffect(() => {
                const root = window.document.documentElement;
                if (isDarkMode) {
                    root.classList.add('dark');
                    localStorage.setItem('theme', 'dark');
                } else {
                    root.classList.remove('dark');
                    localStorage.setItem('theme', 'light');
                }
            }, [isDarkMode]);

            const toggleTheme = () => {
                setIsDarkMode(!isDarkMode);
            };

            return (
                <button
                    onClick={toggleTheme}
                    className="fixed top-4 right-4 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 p-2 rounded-full"
                >
                    {isDarkMode ? 'Light' : 'Dark'}
                </button>
            );
        };

        // --- MOCK API ---
        const mockApi = {
            cars: [
                { id: 1, name: 'Toyota Camry', price: 75000, location: 'Dubai', image: 'https://via.placeholder.com/300x200.png?text=Toyota+Camry', year: 2021, make: 'Toyota' },
                { id: 2, name: 'Honda Accord', price: 68000, location: 'Abu Dhabi', image: 'https://via.placeholder.com/300x200.png?text=Honda+Accord', year: 2020, make: 'Honda' },
                { id: 3, name: 'Nissan Patrol', price: 150000, location: 'Sharjah', image: 'https://via.placeholder.com/300x200.png?text=Nissan+Patrol', year: 2022, make: 'Nissan' },
                { id: 4, name: 'Ford Mustang', price: 180000, location: 'Dubai', image: 'https://via.placeholder.com/300x200.png?text=Ford+Mustang', year: 2023, make: 'Ford' },
            ],
            messages: [
                { id: 1, from: 'seller', text: 'Yes, it is available.' },
                { id: 2, from: 'user', text: 'Great! Can I see it tomorrow?' }
            ],
            fetchCars: function(filters = {}) {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        let filteredCars = this.cars;
                        if (filters.make) {
                            filteredCars = filteredCars.filter(car => car.make.toLowerCase() === filters.make.toLowerCase());
                        }
                        if (filters.minPrice) {
                            filteredCars = filteredCars.filter(car => car.price >= filters.minPrice);
                        }
                        if (filters.maxPrice) {
                            filteredCars = filteredCars.filter(car => car.price <= filters.maxPrice);
                        }
                        resolve(filteredCars);
                    }, 500);
                });
            },
            fetchCarById: function(id) {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        resolve(this.cars.find(car => car.id === id));
                    }, 300);
                });
            },
            login: function(email, password) {
                return new Promise((resolve, reject) => {
                    setTimeout(() => {
                        if (email === 'user@test.com' && password === 'password') {
                            resolve({ token: 'mock-jwt-token' });
                        } else {
                            reject(new Error('Invalid credentials'));
                        }
                    }, 500);
                });
            },
            register: function(userData) {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        resolve({ token: 'new-mock-jwt-token' });
                    }, 500);
                });
            },
            postAd: function(adData) {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        const newCar = { ...adData, id: this.cars.length + 1, image: `https://via.placeholder.com/300x200.png?text=${adData.name.replace(' ', '+')}` };
                        this.cars.push(newCar);
                        resolve(newCar);
                    }, 500);
                });
            },
            fetchMessages: function() {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        resolve(this.messages);
                    }, 200);
                });
            },
            sendMessage: function(text) {
                return new Promise((resolve) => {
                    setTimeout(() => {
                        const newMessage = { id: this.messages.length + 1, from: 'user', text };
                        this.messages.push(newMessage);
                        resolve(newMessage);
                    }, 200);
                });
            }
        };

        // --- COMPONENTS ---

        const AuthContext = React.createContext();

        const AuthProvider = ({ children }) => {
            const [user, setUser] = React.useState(null);
            const [token, setToken] = React.useState(localStorage.getItem('token'));

            React.useEffect(() => {
                if (token) {
                    // In a real app, you'd verify the token with the server
                    setUser({ email: 'user@test.com' });
                    localStorage.setItem('token', token);
                } else {
                    localStorage.removeItem('token');
                }
            }, [token]);

            const login = async (email, password) => {
                const { token } = await mockApi.login(email, password);
                setToken(token);
            };

            const logout = () => {
                setToken(null);
                setUser(null);
            };

            return (
                <AuthContext.Provider value={{ user, token, login, logout }}>
                    {children}
                </AuthContext.Provider>
            );
        };

        const useAuth = () => React.useContext(AuthContext);

        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false };
            }

            static getDerivedStateFromError(error) {
                return { hasError: true };
            }

            render() {
                if (this.state.hasError) {
                    return <h1 className="text-red-500 text-center p-8">Something went wrong.</h1>;
                }
                return this.props.children;
            }
        }

        const Spinner = () => (
            <div className="flex justify-center items-center p-8">
                <div className="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-primary"></div>
            </div>
        );

        const Notification = ({ message, onClear }) => {
            React.useEffect(() => {
                const timer = setTimeout(() => {
                    onClear();
                }, 3000);
                return () => clearTimeout(timer);
            }, [onClear]);

            return (
                <div className="fixed top-4 right-4 bg-green-500 text-white p-4 rounded-lg shadow-lg animate-pulse" role="alert">
                    {message}
                </div>
            );
        };

        const CarCard = ({ car, onClick }) => (
            <div className="bg-white dark:bg-gray-800 rounded-lg shadow-md overflow-hidden" onClick={onClick} role="button" aria-label={`View details for ${car.name}`}>
                <img src={car.image} alt={car.name} className="w-full h-48 object-cover" />
                <div className="p-4">
                    <h3 className="text-lg font-bold text-gray-900 dark:text-white">{car.name}</h3>
                    <p className="text-primary font-semibold">{car.price.toLocaleString()} AED</p>
                    <p className="text-gray-600 dark:text-gray-400">{car.location}</p>
                </div>
            </div>
        );

        const NavBar = ({ activeScreen, setActiveScreen }) => {
            const { user } = useAuth();
            const handleNav = (screen) => {
                if ((screen === 'postAd' || screen === 'profile' || screen === 'messages') && !user) {
                    setActiveScreen('login');
                } else {
                    setActiveScreen(screen);
                }
            };

            return (
                <div className="fixed bottom-0 left-0 right-0 bg-white dark:bg-gray-800 shadow-t">
                    <div className="flex justify-around p-2">
                        <button onClick={() => handleNav('home')} className={`text-gray-600 dark:text-gray-300 ${activeScreen === 'home' ? 'text-primary' : ''}`}>Home</button>
                        <button onClick={() => handleNav('search')} className={`text-gray-600 dark:text-gray-300 ${activeScreen === 'search' ? 'text-primary' : ''}`}>Search</button>
                        <button onClick={() => handleNav('postAd')} className={`text-gray-600 dark:text-gray-300 ${activeScreen === 'postAd' ? 'text-primary' : ''}`}>Post Ad</button>
                        <button onClick={() => handleNav('messages')} className={`text-gray-600 dark:text-gray-300 ${activeScreen === 'messages' ? 'text-primary' : ''}`}>Messages</button>
                        <button onClick={() => handleNav('profile')} className={`text-gray-600 dark:text-gray-300 ${activeScreen === 'profile' ? 'text-primary' : ''}`}>Profile</button>
                    </div>
                </div>
            );
        };

        const HomeScreen = ({ setActiveScreen, setSelectedCarId }) => {
            const [cars, setCars] = React.useState([]);
            const [loading, setLoading] = React.useState(true);
            const [error, setError] = React.useState(null);

            React.useEffect(() => {
                mockApi.fetchCars()
                    .then(setCars)
                    .catch(() => setError("Could not fetch cars."))
                    .finally(() => setLoading(false));
            }, []);

            const handleCarClick = (id) => {
                setSelectedCarId(id);
                setActiveScreen('carDetails');
            };

            if (loading) return <Spinner />;
            if (error) return <p className="text-red-500 text-center">{error}</p>;

            return (
                <div>
                    <h2 className="text-2xl font-bold text-gray-900 dark:text-white mb-4">Featured Cars</h2>
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        {cars.map(car => <CarCard key={car.id} car={car} onClick={() => handleCarClick(car.id)} />)}
                    </div>
                </div>
            );
        };

        const SearchScreen = ({ setActiveScreen, setSelectedCarId }) => {
            const [cars, setCars] = React.useState([]);
            const [filters, setFilters] = React.useState({});
            const [loading, setLoading] = React.useState(false);

            const handleSearch = () => {
                setLoading(true);
                mockApi.fetchCars(filters).then(setCars).finally(() => setLoading(false));
            };

            const handleCarClick = (id) => {
                setSelectedCarId(id);
                setActiveScreen('carDetails');
            };

            return (
                <div>
                    <h2 className="text-2xl font-bold text-gray-900 dark:text-white mb-4">Search Cars</h2>
                    <div className="bg-white dark:bg-gray-800 p-4 rounded-lg shadow-md mb-4">
                        <input type="text" placeholder="Make" className="w-full p-2 border rounded mb-2" onChange={e => setFilters({...filters, make: e.target.value})} aria-label="Search by make" />
                        <div className="grid grid-cols-2 gap-2">
                            <input type="number" placeholder="Min price" className="w-full p-2 border rounded" onChange={e => setFilters({...filters, minPrice: e.target.value})} aria-label="Minimum price" />
                            <input type="number" placeholder="Max price" className="w-full p-2 border rounded" onChange={e => setFilters({...filters, maxPrice: e.target.value})} aria-label="Maximum price" />
                        </div>
                        <button onClick={handleSearch} className="w-full bg-primary text-white p-2 rounded mt-2">Search</button>
                    </div>
                    {loading ? <Spinner /> : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {cars.map(car => <CarCard key={car.id} car={car} onClick={() => handleCarClick(car.id)} />)}
                        </div>
                    )}
                </div>
            );
        };

        const StripeCheckoutModal = ({ car, onClose, onPaymentSuccess }) => (
            <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                <div className="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-xl w-full max-w-sm">
                    <h3 className="text-xl font-bold mb-4">Complete Your Purchase</h3>
                    <p>You are buying: <strong>{car.name}</strong></p>
                    <p className="text-primary text-lg my-2">Price: {car.price.toLocaleString()} AED</p>
                    <div className="my-4">
                        <input type="text" placeholder="Card Number (e.g., 4242 4242 4242 4242)" className="w-full p-2 border rounded mb-2" aria-label="Card Number" />
                        <div className="grid grid-cols-2 gap-2">
                            <input type="text" placeholder="MM/YY" className="p-2 border rounded" aria-label="Expiration Date" />
                            <input type="text" placeholder="CVC" className="p-2 border rounded" aria-label="CVC" />
                        </div>
                    </div>
                    <button onClick={onPaymentSuccess} className="w-full bg-primary text-white p-2 rounded">Pay Now</button>
                    <button onClick={onClose} className="w-full text-center text-gray-600 dark:text-gray-400 mt-2">Cancel</button>
                </div>
            </div>
        );

        const CarDetailsScreen = ({ carId }) => {
            const [car, setCar] = React.useState(null);
            const [showCheckout, setShowCheckout] = React.useState(false);
            const [paymentSuccess, setPaymentSuccess] = React.useState(false);
            const [loading, setLoading] = React.useState(true);

            React.useEffect(() => {
                mockApi.fetchCarById(carId).then(setCar).finally(() => setLoading(false));
            }, [carId]);

            const handlePaymentSuccess = () => {
                setShowCheckout(false);
                setPaymentSuccess(true);
            };

            if (loading) return <Spinner />;
            if (!car) return <p className="text-red-500 text-center">Car not found.</p>;

            if (paymentSuccess) {
                return (
                    <div className="text-center p-8">
                        <h2 className="text-2xl font-bold text-green-500">Payment Successful!</h2>
                        <p>You have successfully purchased the {car.name}.</p>
                    </div>
                );
            }

            return (
                <div>
                    <img src={car.image} alt={car.name} className="w-full h-64 object-cover rounded-lg" />
                    <h2 className="text-3xl font-bold text-gray-900 dark:text-white mt-4">{car.name}</h2>
                    <p className="text-2xl text-primary font-semibold my-2">{car.price.toLocaleString()} AED</p>
                    <p className="text-gray-700 dark:text-gray-300">
                        A great car from {car.year}. Located in {car.location}.
                    </p>
                    <button onClick={() => setShowCheckout(true)} className="w-full bg-accent text-white p-2 rounded mt-4">Buy Now</button>
                    {showCheckout && <StripeCheckoutModal car={car} onClose={() => setShowCheckout(false)} onPaymentSuccess={handlePaymentSuccess} />}
                </div>
            );
        };

        const ProfileScreen = () => {
            const { user, logout } = useAuth();
            return (
                <div>
                    <h2 className="text-2xl font-bold text-gray-900 dark:text-white mb-4">My Profile</h2>
                    <div className="bg-white dark:bg-gray-800 p-4 rounded-lg shadow-md">
                        <p className="text-lg font-semibold">{user.email}</p>
                        <button onClick={logout} className="w-full bg-accent text-white p-2 rounded mt-4">Logout</button>
                    </div>
                </div>
            );
        };

        const LoginScreen = ({ setActiveScreen }) => {
            const { login } = useAuth();
            const [email, setEmail] = React.useState('');
            const [password, setPassword] = React.useState('');
            const [error, setError] = React.useState('');

            const handleLogin = async () => {
                try {
                    await login(email, password);
                    setActiveScreen('home');
                } catch (err) {
                    setError(err.message);
                }
            };

            return (
                <div>
                    <h2 className="text-2xl font-bold text-gray-900 dark:text-white mb-4">Login</h2>
                    <div className="bg-white dark:bg-gray-800 p-4 rounded-lg shadow-md">
                        {error && <p className="text-red-500 bg-red-100 p-2 rounded mb-2">{error}</p>}
                        <input type="email" placeholder="Email (user@test.com)" className="w-full p-2 border rounded mb-2" value={email} onChange={e => setEmail(e.target.value)} />
                        <input type="password" placeholder="Password (password)" className="w-full p-2 border rounded mb-2" value={password} onChange={e => setPassword(e.target.value)} />
                        <button onClick={handleLogin} className="w-full bg-primary text-white p-2 rounded">Login</button>
                        <p className="text-center mt-2">
                            Don't have an account? <button onClick={() => setActiveScreen('register')} className="text-primary">Register</button>
                        </p>
                    </div>
                </div>
            );
        };

        const RegisterScreen = ({ setActiveScreen }) => {
            const { login } = useAuth();
            const [error, setError] = React.useState('');
            const [formData, setFormData] = React.useState({ name: '', email: '', password: '' });

            const handleRegister = async () => {
                if (!formData.name || !formData.email || !formData.password) {
                    setError('All fields are required.');
                    return;
                }
                await mockApi.register(formData);
                login('user@test.com', 'password');
                setActiveScreen('home');
            };

            return (
                <div>
                    <h2 className="text-2xl font-bold text-gray-900 dark:text-white mb-4">Register</h2>
                    <div className="bg-white dark:bg-gray-800 p-4 rounded-lg shadow-md">
                        {error && <p className="text-red-500 bg-red-100 p-2 rounded mb-2">{error}</p>}
                        <input type="text" placeholder="Full Name" className="w-full p-2 border rounded mb-2" onChange={e => setFormData({...formData, name: e.target.value})} />
                        <input type="email" placeholder="Email" className="w-full p-2 border rounded mb-2" onChange={e => setFormData({...formData, email: e.target.value})} />
                        <input type="password" placeholder="Password" className="w-full p-2 border rounded mb-2" onChange={e => setFormData({...formData, password: e.target.value})} />
                        <button onClick={handleRegister} className="w-full bg-primary text-white p-2 rounded">Register</button>
                        <p className="text-center mt-2">
                            Already have an account? <button onClick={() => setActiveScreen('login')} className="text-primary">Login</button>
                        </p>
                    </div>
                </div>
            );
        };

        const PostAdScreen = ({ setActiveScreen }) => {
            const [adData, setAdData] = React.useState({ name: '', price: '', year: '', make: '' });
            const [error, setError] = React.useState('');

            const handlePost = async () => {
                if (!adData.name || !adData.price || !adData.year || !adData.make) {
                    setError('All fields are required.');
                    return;
                }
                await mockApi.postAd(adData);
                setActiveScreen('home');
            };

            return (
                <div>
                    <h2 className="text-2xl font-bold text-gray-900 dark:text-white mb-4">Post a New Ad</h2>
                    <div className="bg-white dark:bg-gray-800 p-4 rounded-lg shadow-md">
                        {error && <p className="text-red-500 bg-red-100 p-2 rounded mb-2">{error}</p>}
                        <input type="text" placeholder="Car Name" className="w-full p-2 border rounded mb-2" onChange={e => setAdData({...adData, name: e.target.value})} />
                        <input type="text" placeholder="Car Make" className="w-full p-2 border rounded mb-2" onChange={e => setAdData({...adData, make: e.target.value})} />
                        <input type="number" placeholder="Year" className="w-full p-2 border rounded mb-2" onChange={e => setAdData({...adData, year: e.target.value})} />
                        <input type="number" placeholder="Price" className="w-full p-2 border rounded mb-2" onChange={e => setAdData({...adData, price: e.target.value})} />
                        <textarea placeholder="Description" className="w-full p-2 border rounded mb-2"></textarea>
                        <button onClick={handlePost} className="w-full bg-primary text-white p-2 rounded">Post Ad</button>
                    </div>
                </div>
            );
        };

        const MessagingScreen = ({ setNotification }) => {
            const [messages, setMessages] = React.useState([]);
            const [newMessage, setNewMessage] = React.useState('');

            React.useEffect(() => {
                mockApi.fetchMessages().then(setMessages);
            }, []);

            const handleSend = async () => {
                const sentMessage = await mockApi.sendMessage(newMessage);
                setMessages([...messages, sentMessage]);
                setNewMessage('');
                setNotification('Message sent!');
            };

            return (
                <div>
                    <h2 className="text-2xl font-bold text-gray-900 dark:text-white mb-4">Messages</h2>
                    <div className="bg-white dark:bg-gray-800 rounded-lg shadow-md">
                        <div className="p-4 h-64 overflow-y-auto">
                            {messages.map(msg => (
                                <div key={msg.id} className={`flex ${msg.from === 'user' ? 'justify-end' : 'justify-start'} mb-2`}>
                                    <p className={`${msg.from === 'user' ? 'bg-primary text-white' : 'bg-gray-200 dark:bg-gray-700'} p-2 rounded-lg`}>
                                        {msg.text}
                                    </p>
                                </div>
                            ))}
                        </div>
                        <div className="p-4 border-t dark:border-gray-700 flex">
                            <input type="text" placeholder="Type a message..." className="w-full p-2 border rounded-l" value={newMessage} onChange={e => setNewMessage(e.target.value)} />
                            <button onClick={handleSend} className="bg-primary text-white p-2 rounded-r">Send</button>
                        </div>
                    </div>
                </div>
            );
        };


        // --- APP ---
        const App = () => {
            const { user } = useAuth();
            const [activeScreen, setActiveScreen] = React.useState('home');
            const [selectedCarId, setSelectedCarId] = React.useState(null);
            const [notification, setNotification] = React.useState(null);

            React.useEffect(() => {
                if (!user && (activeScreen === 'profile' || activeScreen === 'postAd' || activeScreen === 'messages')) {
                    setActiveScreen('login');
                }
            }, [user, activeScreen]);

            const renderScreen = () => {
                switch (activeScreen) {
                    case 'home':
                        return <HomeScreen setActiveScreen={setActiveScreen} setSelectedCarId={setSelectedCarId} />;
                    case 'search':
                        return <SearchScreen setActiveScreen={setActiveScreen} setSelectedCarId={setSelectedCarId} />;
                    case 'postAd':
                        return <PostAdScreen setActiveScreen={setActiveScreen} />;
                    case 'messages':
                        return <MessagingScreen setNotification={setNotification} />;
                    case 'profile':
                        return <ProfileScreen />;
                    case 'login':
                        return <LoginScreen setActiveScreen={setActiveScreen} />;
                    case 'register':
                        return <RegisterScreen setActiveScreen={setActiveScreen} />;
                    case 'carDetails':
                        return <CarDetailsScreen carId={selectedCarId} />;
                    default:
                        return <HomeScreen setActiveScreen={setActiveScreen} setSelectedCarId={setSelectedCarId} />;
                }
            };

            return (
                <div className="pb-16">
                    <ThemeSwitcher />
                    {notification && <Notification message={notification} onClear={() => setNotification(null)} />}
                    <div className="p-4">
                        {renderScreen()}
                    </div>
                    <NavBar activeScreen={activeScreen} setActiveScreen={setActiveScreen} />
                </div>
            );
        };

        ReactDOM.render(<ErrorBoundary><AuthProvider><App /></AuthProvider></ErrorBoundary>, document.getElementById('root'));
    </script>

    <!--
    --- TESTING PLAN ---

    **1. Manual Test Cases**

    *   **User Authentication:**
        *   [ ] Navigate to the login page.
        *   [ ] Attempt to log in with incorrect credentials. Verify error message is shown.
        *   [ ] Log in with correct credentials (`user@test.com` / `password`). Verify navigation to home screen.
        *   [ ] Navigate to the profile page. Verify user email is shown.
        *   [ ] Log out. Verify user is returned to the login screen or home screen.
        *   [ ] Attempt to access a protected page (e.g., Profile) while logged out. Verify redirection to login.
        *   [ ] Register a new (mock) user. Verify automatic login and redirection.

    *   **Car Listings and Search:**
        *   [ ] On the home screen, verify that featured cars are displayed.
        *   [ ] Click on a car card. Verify navigation to the car details page.
        *   [ ] On the car details page, verify all information is correct.
        *   [ ] Go to the search page.
